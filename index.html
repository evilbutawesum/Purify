<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Purify</title>
<link rel="preconnect" href="https://googleapis.com">
<link href="https://googleapis.com/css2?family=Josefin+Sans:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Josefin Sans',sans-serif;
}
body{
background:#000;
color:#fff;
height:100vh;
overflow:hidden;
}
#stars{
position:fixed;
inset:0;
z-index:-1;
overflow:hidden;
}
.star{
position:absolute;
width:3px;
height:3px;
background:white;
border-radius:50%;
opacity:0.8;
animation:move 25s linear infinite;
}
@keyframes move{
0%{transform:translateX(0);}
100%{transform:translateX(-30vw);}
}
.main{
height:100vh;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
}
.logo{
font-size:11rem;
font-weight:700;
text-align:center;
letter-spacing:-2px;
}
.subtitle{
margin-top:18px;
text-align:center;
font-size:1.2rem;
}
.search-row{
margin-top:40px;
display:flex;
gap:10px;
}
.search{
width:480px;
height:72px;
font-size:1.4rem;
padding:0 20px;
border:none;
border-radius:20px;
outline:none;
color:#000;
}
.search-btn{
width:80px;
height:72px;
font-size:2rem;
border:none;
border-radius:20px;
cursor:pointer;
}
.shortcuts{
display:flex;
gap:80px;
margin-top:40px;
}
.shortcut{
display:flex;
flex-direction:column;
align-items:center;
cursor:pointer;
transition:0.2s;
}
.shortcut:hover{
transform:scale(1.05);
}
.icon{
width:100px;
height:100px;
background:#444;
border-radius:20px;
display:flex;
align-items:center;
justify-content:center;
font-size:3rem;
}
.label{
margin-top:10px;
font-size:1.2rem;
font-weight:600;
}
.sidebar{
position:fixed;
left:-240px;
top:0;
width:240px;
height:100%;
background:rgba(20,20,20,.97);
backdrop-filter:blur(10px);
transition:0.25s ease;
display:flex;
flex-direction:column;
padding-top:60px;
z-index:10;
}
.sidebar.open{
left:0;
}
.nav-btn{
padding:18px;
font-size:1.3rem;
cursor:pointer;
}
.nav-btn:hover{
background:rgba(255,255,255,0.1);
}
.edge-zone{
position:fixed;
left:0;
top:0;
width:20px;
height:100%;
z-index:20;
}
</style>
</head>
<body>
<div id="stars"></div>
<div class="edge-zone"></div>
<div class="sidebar" id="sidebar">
<div class="nav-btn">🏠 Home</div>
<div class="nav-btn">🌐 Proxy</div>
<div class="nav-btn">🎮 Games</div>
<div class="nav-btn">📱 Apps</div>
<div class="nav-btn">🤖 AI</div>
<div class="nav-btn">🥭 Cool Stuff</div>
<div class="nav-btn">⚙️ Settings</div>
</div>
<div class="main">
<div class="logo">Purify</div>
<div class="subtitle">Freedom for every student out there.</div>
<div class="search-row">
<input class="search" placeholder="Search...">
<button class="search-btn">🔍</button>
</div>
<div class="shortcuts">
<div class="shortcut">
<div class="icon">🎮</div>
<div class="label">Games</div>
</div>
<div class="shortcut">
<div class="icon">📱</div>
<div class="label">Apps</div>
</div>
<div class="shortcut">
<div class="icon">🤖</div>
<div class="label">AI</div>
</div>
</div>
</div>
<script>
const stars=document.getElementById("stars");
for(let i=0;i<180;i++){
const s=document.createElement("div");
s.className="star";
s.style.left=Math.random()*100+"vw";
s.style.top=Math.random()*100+"vh";
s.style.width=(Math.random()*2+2)+"px";
s.style.height=s.style.width;
s.style.animationDuration=(15+Math.random()*30)+"s";
stars.appendChild(s);
}
const sidebar=document.getElementById("sidebar");
const edge=document.querySelector(".edge-zone");
edge.addEventListener("mouseenter",()=>sidebar.classList.add("open"));
sidebar.addEventListener("mouseleave",()=>sidebar.classList.remove("open"));
edge.addEventListener("touchstart",()=>sidebar.classList.add("open"));
document.addEventListener("touchstart",(e)=>{
if(!sidebar.contains(e.target) && !edge.contains(e.target)){
sidebar.classList.remove("open");
}
});

const searchInput = document.querySelector(".search");
const searchBtn = document.querySelector(".search-btn");

function launchProxy() {
    let url = searchInput.value.trim();
    if (!url) return;
    if (!url.includes(".") || url.includes(" ")) {
        url = "https://google.com" + encodeURIComponent(url);
    } else if (!url.startsWith("http://") && !url.startsWith("https://")) {
        url = "https://" + url;
    }
    
    window.location.href = "/scram/service?url=" + encodeURIComponent(url);
}
searchBtn.addEventListener("click", launchProxy);
searchInput.addEventListener("keydown", (e) => {
    if (e.key === "Enter") launchProxy();
});
</script>
</body>
</html>
